upstream openslt_api { server 127.0.0.1:8000; }
server {
    listen 80;
    server_name _;
    client_max_body_size 2g;
    root /opt/openslt/frontend/dist;
    location / { try_files $uri $uri/ /index.html; }
    location /api/ { proxy_pass http://openslt_api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Trace-ID $http_x_trace_id; proxy_read_timeout 3600; }
    location /api/v1/ws/ { proxy_pass http://openslt_api; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_read_timeout 86400; }
}

